name: Registry check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  registry-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate registry entries
        run: node scripts/build.mjs --check

      - name: Full build
        run: node scripts/build.mjs
